<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MTGTop8 PCA</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="controls" aria-label="Analysis controls">
        <div class="brand-row">
          <div>
            <h1>MTGTop8 PCA</h1>
            <p>Decklist similarity from search results</p>
          </div>
        </div>

        <details class="nerd-stuff basic-settings" open>
          <summary>Basic Settings</summary>
          <section class="search-builder" aria-label="MTGTop8 search">
            <div class="search-grid">
              <label>
                <span>Event</span>
                <input id="searchEvent" type="text" />
              </label>
              <label>
                <span>Player</span>
                <input id="searchPlayer" type="text" />
              </label>
              <label>
                <span>Deck</span>
                <input id="searchDeck" type="text" />
              </label>
              <label>
                <span>Format</span>
                <select id="searchFormat">
                  <option value="">All</option>
                </select>
              </label>
              <label>
                <span>Archetype</span>
                <select id="searchArchetype">
                  <option value="">All</option>
                </select>
              </label>
              <label>
                <span>Scope</span>
                <select id="scope">
                  <option value="maindeck">Maindeck</option>
                  <option value="full75">Full 75</option>
                  <option value="sideboard">Sideboard</option>
                </select>
              </label>
            </div>

            <div id="levelChecks" class="check-grid"></div>

            <label>
              <span>Cards</span>
              <textarea id="searchCards" class="short" spellcheck="false" placeholder="Writhing Chrysalis"></textarea>
            </label>

            <div class="check-grid">
              <label class="check-row">
                <input id="searchMainDeck" type="checkbox" checked />
                <span>Main deck</span>
              </label>
              <label class="check-row">
                <input id="searchSideboard" type="checkbox" />
                <span>Sideboard</span>
              </label>
            </div>

            <div class="search-grid">
              <label>
                <span>From</span>
                <input id="searchDateStart" type="date" />
              </label>
              <label>
                <span>To</span>
                <input id="searchDateEnd" type="date" />
              </label>
            </div>
          </section>
        </details>

        <details class="nerd-stuff card-equivalency">
          <summary>Card Equivalency</summary>
          <div class="equivalency-body">
            <label>
              <span>Classes</span>
              <textarea id="cardAliases" class="short" spellcheck="false" placeholder="Label: Equivalent Card, Equivalent Card"></textarea>
            </label>
          </div>
        </details>

        <details class="nerd-stuff">
          <summary>Nerd Stuff</summary>
          <div class="grid-controls">
            <label>
              <span>Projection</span>
              <select id="projection">
                <option value="pcoa_braycurtis">Bray-Curtis PCoA</option>
                <option value="pcoa_cosine">Cosine PCoA</option>
                <option value="pca">PCA Counts</option>
                <option value="umap_braycurtis">UMAP (Experimental)</option>
              </select>
            </label>
            <label>
              <span>Cluster Space</span>
              <select id="clusterSpace">
                <option value="plot">Plot Space</option>
                <option value="deck">Deck Space</option>
              </select>
            </label>
            <label>
              <span>Clustering</span>
              <select id="clusterMethod">
                <option value="auto">Auto Hierarchical</option>
                <option value="hdbscan">HDBSCAN Density</option>
                <option value="fixed">Fixed K</option>
              </select>
            </label>
            <label id="outlierModeControl">
              <span>Outliers</span>
              <select id="outlierMode">
                <option value="auto">Auto</option>
                <option value="noise">Mark As Noise</option>
                <option value="keep">Keep As Clusters</option>
              </select>
            </label>
            <label id="clusterKControl">
              <span>Clusters</span>
              <input id="clusterK" type="number" min="1" max="8" value="2" />
            </label>
          </div>

          <label class="check-row">
            <input id="scaleClusters" type="checkbox" checked />
            <span>Standardize Euclidean clustering inputs</span>
          </label>
        </details>

        <button id="analyzeButton" type="button">Analyze</button>
        <div id="status" class="status">Ready</div>
      </section>

      <section class="workspace">
        <div class="plot-header">
          <div>
            <h2 id="plotTitle">Similarity Plot</h2>
            <p id="summary">Choose search settings, then run analysis.</p>
          </div>
          <div id="metrics" class="metrics"></div>
        </div>
        <div class="plot-wrap">
          <svg id="plot" role="img" aria-label="Deck PCA scatter plot"></svg>
          <div id="tooltip" class="tooltip" hidden></div>
        </div>
        <div class="lower-grid">
          <section class="panel">
            <h3>Clusters</h3>
            <div id="legend"></div>
          </section>
          <section class="panel">
            <h3>Cards</h3>
            <div id="cards"></div>
          </section>
          <section class="panel archetype-panel">
            <h3>Cluster Viewer</h3>
            <div id="archetypeViewer"></div>
          </section>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
